server:
  port: 8080

spring:
  application:
    name: evaluation-service

  # Keycloak Security Configuration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://keycloak.dev.nms.com.vn/realms/tuan-thu-phap-che

  # Datasource Configuration for MySQL
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:192.168.88.6}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:adms_tuanthu}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:adms_tuanthu}
    password: ${MYSQL_PASSWORD:lFt85jKfF2sI}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA / Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

# Springdoc OpenAPI (Swagger) Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    doc-expansion: none
